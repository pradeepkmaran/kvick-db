syntax = "proto3";

package kvick;

// --- Gossip / SWIM Protocol ---

message NodeInfo {
  string node_id = 1;
  string address = 2; // gRPC address, e.g. "192.168.1.10:50051"
  uint64 incarnation = 3;
  enum State {
    ALIVE = 0;
    SUSPECT = 1;
    DEAD = 2;
    LEFT = 3;
  }
  State state = 4;
}

message PingMessage {
  string sender_id = 1;
  string sender_address = 2;
  repeated NodeInfo piggybacked_updates = 3;
}

message AckMessage {
  string sender_id = 1;
  repeated NodeInfo piggybacked_updates = 2;
}

message PingReqMessage {
  string sender_id = 1;
  string target_id = 2;
  string target_address = 3;
  repeated NodeInfo piggybacked_updates = 4;
}

service GossipService {
  rpc Ping(PingMessage) returns (AckMessage);
  rpc PingReq(PingReqMessage) returns (AckMessage);
}

// --- KV Proxy Protocol ---

message KVRequest {
  string op = 1; // GET, SET, DEL
  string key = 2;
  string value = 3; // Empty for GET/DEL
}

message KVResponse {
  bool success = 1;
  string result = 2; // Value for GET, or error message, or "OK"
}

// --- Dynamo-style Replication ---

message VectorClockEntry {
  string node_id = 1;
  uint32 counter = 2;
}

message VersionedValue {
  string value = 1; 
  repeated VectorClockEntry clock = 2;
  bool is_tombstone = 3;
}

message ReplicateWriteRequest {
  string key = 1;
  VersionedValue value = 2;
}

message QuorumReadRequest {
  string key = 1;
}

message QuorumReadResponse {
  repeated VersionedValue values = 1;
}

service KVProxyService {
  rpc ProxyCommand(KVRequest) returns (KVResponse);
  rpc ReplicateWrite(ReplicateWriteRequest) returns (KVResponse);
  rpc QuorumRead(QuorumReadRequest) returns (QuorumReadResponse);
}
